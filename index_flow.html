<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/fhem-tablet-ui.css">

<script src="lib/jquery.min.js"></script>
<script src="js/fhem-tablet-ui.min.js"></script>

<style>

body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
}


.dashboard{
    width:min(1500px,98vw);
    margin:auto;
    padding:10px;
    box-sizing:border-box;
}
    
  .title{
    text-align:center;
    font-size:clamp(26px,3vw,38px);
    padding:10px 0 12px 0;
    font-weight:bold;
    color:#fff;
}
    
.toprow{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:14px;
}

.bottomrow{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    background:#1b1b1b;
    border-radius:18px;
    padding:18px;
    box-shadow:0 0 18px rgba(0,0,0,.45);
    min-height:260px;
    display:flex;
    flex-direction:column;
}

.cardtitle{
    font-size:clamp(20px,2vw,28px);
    text-align:center;
    margin-bottom:8px;
}
    
 .value{
    text-align:center;
    font-size:clamp(36px,4vw,58px);
    color:#00ff99;
    font-weight:bold;
}   

.label{
    font-size:20px;
    color:#bbb;
    margin-top:10px;
    text-align:center;
}

.bar{
    width:92%;
    margin:auto;
    height:22px;
    background:#444;
    border-radius:14px;
    overflow:hidden;
    margin-top:15px;
}

.barfill{
    display:block;
    width:50%;
    height:22px;
    background:#2ecc71;
    transition:width .5s;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-top:18px;
}

.btn{
    flex:1;
    background:#1976d2;
    border-radius:12px;
    padding:18px;
    color:#fff;
    font-size:26px;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
}

.btn:hover{
    background:#29a0ff;
}

.statusdot{
    width:26px;
    height:26px;
    border-radius:50%;
    margin:12px auto;
    background:#d32f2f;
}

.statusdot.on{
    background:#43a047;
}

.statustext{

    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:8px;
    margin-bottom:8px;

}

.statustext.on{

    color:#2ecc71;

}

.statustext.off{

    color:#e74c3c;

}

.powertext{
    text-align:center;
    color:#ddd;
    font-size:22px;
    margin-top:12px;
    font-weight:bold;
}
    .infoLine{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:6px 0;
}

    .sliderbox{
    margin:18px 10px 8px 10px;
}

.sliderValue{
    text-align:center;
    font-size:20px;
    color:#bbb;
    margin-bottom:10px;
}

/* ---------- Tablet (alle iPads) ---------- */

@media (max-width:1366px){

    .dashboard{
        width:99vw;
        padding:6px;
    }

    .toprow{
        gap:8px;
        margin-bottom:12px;
    }

    .bottomrow{
        gap:8px;
    }

    .card{
        min-height:170px;
        padding:10px;
        border-radius:12px;
    }

    .title{
        font-size:26px;
        padding:12px;
    }

    .cardtitle{
        font-size:10px;
        margin-bottom:6px;
    }

    .value{
        font-size:30px;
    }

    .label{
        font-size:14px;
    }

    .btn{
        font-size:16px;
        padding:10px;
        border-radius:10px;
    }

    .powertext{
        font-size:16px;
    }

    .statustext{
        font-size:16px;
    }

    .bar{
        height:16px;
    }

    .barfill{
        height:16px;
    }

}

.statusbar{
    margin-top:14px;
    padding:8px 14px;
    border-top:1px solid #333;
    color:#aaa;
    font-size:14px;

    display:grid;
    grid-template-columns:2fr 1fr 1fr 1fr;
    gap:12px;
    align-items:center;
}    

</style>

</head>

<body>

<div class="title">Haus Energiefluss</div>

<div class="dashboard">

<div class="toprow">

<div class="card">
<div class="cardtitle">PV</div>
<div class="value"
     data-type="label"
     data-device="SENEC"
     data-get="PV-Erzeugung"
     data-unit=" W"></div>
</div>

<div class="card">
<div class="cardtitle">Haus</div>
<div class="value"
     data-type="label"
     data-device="SENEC"
     data-get="Haus-Stromverbrauch"
     data-unit=" W"></div>
</div>

<div class="card">
<div class="cardtitle">Speicher</div>
<div class="value"
     data-type="label"
     data-device="SENEC"
     data-get="AKKU-Beladung"
     data-unit="%"></div>
</div>

<div class="card">
<div class="cardtitle">Netz</div>
<div class="value"
     data-type="label"
     data-device="SENEC"
     data-get="Netz-Bezug"
     data-unit=" W"></div>
</div>

</div>

<div class="bottomrow">

<!-- Smart ----------------------------------------------------->
<div class="card">

<div class="cardtitle">Smart EQ</div>

<div class="bar">
<div id="smartbar" class="barfill"></div>
</div>

<div class="value"
     data-type="label"
     data-device="LadeManager"
     data-get="Smart_SOC"
     data-unit="%">
</div>

<div class="sliderbox">

<input
    id="smartslider"
    type="range"
    min="0"
    max="100"
    value="50"
    style="width:100%;"
    oninput="$('#smartslidervalue').text(this.value+' %');"
    onchange="setSmartSOC(this.value);">

</div>

<div id="smartslidervalue" class="sliderValue">
</div>

<div class="buttons">
<div class="btn" onclick="smart85()">85 %</div>
<div class="btn" onclick="smart100()">100 %</div>
</div>
    
<div style="flex:1"></div>
    
<div class="label">

<div class="infoLine">
    <span>Rest:</span>
    <span>
        <span data-type="label"
              data-device="LadeManager"
              data-get="Smart_Rest_kWh"></span> kWh
    </span>
</div>

<div class="infoLine">
    <span>Ende:</span>
    <span data-type="label"
          data-device="LadeManager"
          data-get="Smart_Ende"></span>
</div>

<br>

Status
<div id="smartstate" class="statustext">
    AUS
</div>

<div id="smartpowertext" class="powertext">
⚡ --
</div>

</div>

<span id="smartpower"
      style="display:none"
      data-type="label"
      data-device="Shelly1_Smart"
      data-get="power">
</span>

<span id="smartrelay"
      style="display:none"
      data-type="label"
      data-device="Shelly1_Smart"
      data-get="relay">
</span>

</div>

<!-- Hyundai ----------------------------------------------------->

    <div class="card">

        <div class="cardtitle">Hyundai Ioniq5</div>
<div class="bar">
    <div id="ioniqbar" class="barfill"></div>
</div>

<div class="value"
     data-type="label"
     data-device="LadeManager"
     data-get="Ioniq5_SOC"
     data-unit="%">
</div>

<div class="sliderbox">

    <input
        id="ioniqslider"
        type="range"
        min="0"
        max="100"
        value="50"
        style="width:100%;"
        oninput="$('#ioniqslidervalue').text(this.value+' %');"
        onchange="setIoniqSOC(this.value);">

</div>

<div id="ioniqslidervalue" class="sliderValue">
</div>
        <div class="buttons">
            <div class="btn" onclick="ioniq85()">85 %</div>
            <div class="btn" onclick="ioniq100()">100 %</div>
        </div>

        <div class="label" style="text-align:center">

<div class="infoLine">
    <span>Rest:</span>
    <span>
        <span data-type="label"
              data-device="LadeManager"
              data-get="Ioniq5_Rest_kWh"></span> kWh
    </span>
</div>

<div class="infoLine">
    <span>Ende:</span>
    <span data-type="label"
          data-device="LadeManager"
          data-get="Ioniq5_Ende"></span>
</div>

<br>

            Status

<div id="ioniqstate" class="statustext">
    AUS
</div>
<div id="ioniqpowertext"
     style="
        text-align:center;
        color:#ddd;
        font-size:18px;
        margin-top:8px;">
    ⚡ --
</div>
            
<span id="ioniqpower"
      style="display:none"
      data-type="label"
      data-device="Shelly2_Ioniq5"
      data-get="power">
</span>
            
<span id="ioniqrelay"
      style="display:none"
      data-type="label"
      data-device="Shelly2_Ioniq5"
      data-get="relay">
</span>
        </div>

    </div>

<!-- Einhell --------------------------------------------------->
<div class="card">

    <div class="cardtitle">Einhell Ladegeräte</div>

    <div class="buttons">
        <div class="btn" onclick="einhellOn()">EIN</div>
        <div class="btn" onclick="einhellOff()">AUS</div>
    </div>

<div class="label">

    Status

    <div id="einhellstate" class="statustext">
        AUS
    </div>

    <div id="einhellpowertext" class="powertext">
        &#9889; --
    </div>
    
   <br>

<div style="text-align:center;color:#bbb;font-size:16px;">
    Gesamt
</div>

<div style="text-align:center;font-size:22px;color:#00ff99;font-weight:bold;">
    <span data-type="label"
          data-device="Shelly3_Einhell"
          data-get="energy_round"></span> kWh
</div>

</div> <!-- Ende Label -->

<span id="einhellpower"
      style="display:none"
      data-type="label"
      data-device="Shelly3_Einhell"
      data-get="power">
</span>

<span id="einhellrelay"
      style="display:none"
      data-type="label"
      data-device="Shelly3_Einhell"
      data-get="relay">
</span>

</div>   <!-- Ende Einhell-Karte -->
    </div>   <!-- Ende Einhell-Karte -->

<div class="statusbar">

    <div>
        Aktualisiert:
        <span id="lastupdate">--:--:--</span>
    </div>

    <div>
        Smart:
        <span id="smartcomm">OK</span>
    </div>

    <div>
        Ioniq:
        <span id="ioniqcomm">OK</span>
    </div>

    <div>
        Einhell:
        <span id="einhellcomm">OK</span>
    </div>

</div>

<script>
<script>
var smart=50;
var ioniq=50;
let smartDragging = false;
let ioniqDragging = false;

function updateBars() {

    // Smart
    let smart = parseFloat(
        $('[data-device="LadeManager"][data-get="Smart_SOC"]')
        .first().text()
    ) || 0;

    $("#smartbar").css("width", smart + "%");

// Slider nur aktualisieren, wenn er nicht benutzt wird
if (!$("#smartslider").is(":focus")) {
    $("#smartslider").val(smart);
}

// Prozentanzeige immer aus FHEM übernehmen
$("#smartslidervalue").text(smart + " %");

    // Hyundai
    let ioniq = parseFloat(
        $('[data-device="LadeManager"][data-get="Ioniq5_SOC"]')
        .first().text()
    ) || 0;
$("#ioniqbar").css("width", ioniq + "%");

if (!$("#ioniqslider").is(":focus")) {
    $("#ioniqslider").val(ioniq);
}

$("#ioniqslidervalue").text(ioniq + " %");
}   // <<< Ende von updateBars()
    
function updateStatus() {
// Smart Status

const smartRelay = $("#smartrelay").text() === "on";
const sp = parseFloat($("#smartpower").text()) || 0;

if (!smartRelay) {

    $("#smartstate")
        .text("AUS")
        .removeClass("on")
        .addClass("off");

} else if (sp > 50) {

    $("#smartstate")
        .text("LÄDT")
        .removeClass("off")
        .addClass("on");

} else {

    $("#smartstate")
        .text("FERTIG")
        .removeClass("off")
        .addClass("on");

}

// Hyundai Status

const ioniqRelay = $("#ioniqrelay").text() === "on";
const ip = parseFloat($("#ioniqpower").text()) || 0;

if (!ioniqRelay) {

    $("#ioniqstate")
        .text("AUS")
        .removeClass("on")
        .addClass("off");

} else if (ip > 50) {

    $("#ioniqstate")
        .text("LÄDT")
        .removeClass("off")
        .addClass("on");

} else {

    $("#ioniqstate")
        .text("FERTIG")
        .removeClass("off")
        .addClass("on");

}

 // Smart

if (smartRelay) {
    $("#smartpowertext").text("⚡ " + formatPower(sp));
} else {
    $("#smartpowertext").text("⚡ --");
}
    
// Ioniq

if ($("#ioniqrelay").text() === "on") {
    $("#ioniqpowertext").text("⚡ " + formatPower(ip));
} else {
    $("#ioniqpowertext").text("⚡ --");
}
// Einhell

const einhellOn = $("#einhellrelay").text() === "on";
if (einhellOn) {

    $("#einhellstate")
        .text("EIN")
        .removeClass("off")
        .addClass("on");

} else {

    $("#einhellstate")
        .text("AUS")
        .removeClass("on")
        .addClass("off");

}

let ep = parseFloat($("#einhellpower").text()) || 0;

if (einhellOn) {
    $("#einhellpowertext").text("⚡ " + formatPower(ep));
} else {
    $("#einhellpowertext").text("⚡ --");
}
} // Ende updateStatus()

function formatPower(watt) {

    if (watt < 1000)
        return Math.round(watt) + " W";

    return (watt / 1000).toFixed(2).replace(".", ",") + " kW";
} // Ende function formatPower

    //-----------------------------------------------------
// Smart
//-----------------------------------------------------

function smart85(){

    $.get("/fhem?XHR=1&cmd="+
        encodeURIComponent("{Smart85();;}"));

}

function smart100(){

    $.get("/fhem?XHR=1&cmd="+
        encodeURIComponent("{Smart100();;}"));

}

//-----------------------------------------------------
// Ioniq
//-----------------------------------------------------

function ioniq85(){

    $.get("/fhem?XHR=1&cmd="+
        encodeURIComponent("{Ioniq85();;}"));

}

function ioniq100(){

    $.get("/fhem?XHR=1&cmd="+
        encodeURIComponent("{Ioniq100();;}"));

}
//-----------------------------------------------------
// Slider
//-----------------------------------------------------
function setSmartSOC(v){

    $.get(
        "/fhem?XHR=1&cmd=" +
        encodeURIComponent('{SetSOC("Smart",' + v + ');;}'),
        function() {
            setTimeout(updateBars, 300);
        }
    );
}

function setIoniqSOC(v){

    $.get(
        "/fhem?XHR=1&cmd=" +
        encodeURIComponent('{SetSOC("Ioniq5",' + v + ');;}'),
        function() {
            setTimeout(updateBars, 300);
        }
    );
}

function einhellOn(){

    $.get("/fhem?XHR=1&cmd=" +
        encodeURIComponent("set Shelly3_Einhell on"));

    setTimeout(updateStatus,500);

}

function einhellOff(){

    $.get("/fhem?XHR=1&cmd=" +
        encodeURIComponent("set Shelly3_Einhell off"));

}  
$(function () {

    updateBars();
    updateStatus();

    setInterval(updateStatus, 250);

});
</script>
</body>
</html>
