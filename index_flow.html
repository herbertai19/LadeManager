<!DOCTYPE html>
<html>
<head>
    

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/fhem-tablet-ui.css">

<script src="lib/jquery.min.js"></script>
<script src="js/fhem-tablet-ui.min.js"></script>

<style>

body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
}

.title{
    text-align:center;
    font-size:38px;
    padding:20px;
    font-weight:bold;
    color:#ffffff;
}
    
.dashboard{
    width:98%;
    max-width:1500px;
    margin:auto;
}

/*************** obere Zeile ****************/

.toprow{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-bottom:30px;
}

/*************** untere Zeile ****************/

.bottomrow{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}

/*************** Karten ****************/

.card{

    background:#1b1b1b;

    border-radius:14px;

    padding:14px;

    box-shadow:0 0 18px rgba(0,0,0,.45);

    min-height:220px;
    height:auto;

}

.cardtitle{

    font-size:26px;

    text-align:center;

    margin-bottom:12px;

}

.value{

    text-align:center;

    font-size:58px;

    color:#00ff99;

    font-weight:bold;

}

.label{

    font-size:20px;

    color:#bbb;

    margin-top:10px;

}

/*************** Balken ****************/

.bar{

    width:92%;

    margin:auto;

    height:22px;

    background:#444;

    border-radius:14px;

    overflow:hidden;

    margin-top:15px;

}

.barfill{
    display:block;
    width:50%;
    height:22px;
    background:#2ecc71;
    transition:width .5s;
}

/*************** Buttons ****************/

.buttons{

    display:flex;

    justify-content:center;

    gap:10px;

    margin-top:10px;

}

.btn{

    flex:1;

    background:#1976d2;

    border-radius:12px;

    padding:18px;

    color:white;

    font-size:26px;

    font-weight:bold;

    text-align:center;

    cursor:pointer;

    transition:.2s;

}

.btn:hover{

    background:#29a0ff;
    transform:scale(1.04);

}

/*************** Status ****************/

.status{

    margin-top:16px;

    font-size:22px;

    text-align:center;

}

.statusdot{
    width:26px;
    height:26px;
    border-radius:50%;
    margin:12px auto;
    background:#d32f2f;
    transition:background-color .3s;
}

.statusdot.on{
    background:#43a047;
}

.green{

    color:#3ddc84;

}

.red{

    color:#ff6666;

}

.orange{

    color:#ffb74d;

}
/***************************************************
 Tablet
****************************************************/

@media (max-width: 1300px) {
    .bar{
        height:18px;
    }

    .barfill{
        height:18px;
    }
        input[type=range]{
        height:18px;
    }

    .title{
        font-size:30px;
    }

    .cardtitle{
        font-size:22px;
    }

    .value{
        font-size:46px;
    }

    .label{
        font-size:17px;
    }

    .buttons{
        gap:10px;
    }

    .btn{
        font-size:18px;
        padding:8px 14px;
    }

}
.statusline{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;

    margin-top:10px;
}

.statusline span{

    color:#ddd;
    font-size:18px;
}    
</style>

</head>

<body>

<div class="title">Haus Energiefluss</div>

<div class="dashboard">

<div class="toprow">

    <div class="card">
        <div class="cardtitle">.. PV</div>
        <div class="value"
             data-type="label"
             data-device="SENEC"
             data-get="PV-Erzeugung"
             data-unit=" W"></div>
    </div>

    <div class="card">
        <div class="cardtitle">.. Haus</div>
        <div class="value"
             data-type="label"
             data-device="SENEC"
             data-get="Haus-Stromverbrauch"
             data-unit=" W"></div>
    </div>

    <div class="card">
        <div class="cardtitle">.. Speicher</div>
        <div class="value"
             data-type="label"
             data-device="SENEC"
             data-get="AKKU-Beladung"
             data-unit="%"></div>
    </div>

    <div class="card">
        <div class="cardtitle">.. Netz</div>
        <div class="value"
             data-type="label"
             data-device="SENEC"
             data-get="Netz-Bezug"
             data-unit=" W"></div>
    </div>

</div>
<div class="bottomrow">

    <!-- Smart ----------------------------------------------------->
    <div class="card">

        <div class="cardtitle">Smart EQ</div>

    <div class="bar">
    <div id="smartbar" class="barfill"></div>
</div>

<div class="value"
     data-type="label"
     data-device="LadeManager"
     data-get="Smart_SOC"
     data-unit="%">
</div>

<div style="margin:18px 10px 8px 10px;">

    <input
        id="smartslider"
        type="range"
        min="0"
        max="100"
        value="50"
        style="width:100%;"
        oninput="$('#smartslidervalue').text(this.value+' %');"
        onchange="setSmartSOC(this.value);">

</div>

<div id="smartslidervalue"
     style="text-align:center;
            font-size:20px;
            color:#bbb;
            margin-bottom:10px;">
    50 %
</div>
        <div class="buttons">
            <div class="btn" onclick="smart85()">85 %</div>
            <div class="btn" onclick="smart100()">100 %</div>
        </div>

        <div class="label" style="text-align:center">

            Rest:
            <span data-type="label"
                  data-device="LadeManager"
                  data-get="Smart_Rest_kWh"></span> kWh

            <br><br>

            Ende:
            <span data-type="label"
                  data-device="LadeManager"
                  data-get="Smart_Ende"></span>

            <br><br>

            Status

            <div id="smartstatus" class="statusdot"></div>
<div id="smartpowertext"
     style="
        text-align:center;
        color:#ddd;
        font-size:18px;
        margin-top:8px;">
    ⚡ --
</div>

</span>
        </div>
<span id="smartpower"
      style="display:none"
      data-type="label"
      data-device="Shelly1_Smart"
      data-get="power">
</span>
<span id="smartrelay"
      style="display:none"
      data-type="label"
      data-device="Shelly1_Smart"
      data-get="relay">
</span>
    </div>

    <!-- Hyundai --------------------------------------------------->
    <div class="card">

        <div class="cardtitle">Hyundai Ioniq5</div>
<div class="bar">
    <div id="ioniqbar" class="barfill"></div>
</div>

<div class="value"
     data-type="label"
     data-device="LadeManager"
     data-get="Ioniq5_SOC"
     data-unit="%">
</div>

<div style="margin:18px 10px 8px 10px;">

    <input
        id="ioniqslider"
        type="range"
        min="0"
        max="100"
        value="50"
        style="width:100%;"
        oninput="$('#ioniqslidervalue').text(this.value+' %');"
        onchange="setIoniqSOC(this.value);">

</div>

<div id="ioniqslidervalue"
     style="text-align:center;
            font-size:20px;
            color:#bbb;
            margin-bottom:10px;">
    50 %
</div>
        <div class="buttons">
            <div class="btn" onclick="ioniq85()">85 %</div>
            <div class="btn" onclick="ioniq100()">100 %</div>
        </div>

        <div class="label" style="text-align:center">

            Rest:
            <span data-type="label"
                  data-device="LadeManager"
                  data-get="Ioniq5_Rest_kWh"></span> kWh

            <br><br>

            Ende:
            <span data-type="label"
                  data-device="LadeManager"
                  data-get="Ioniq5_Ende"></span>

            <br><br>

            Status

            <div id="ioniqstatus" class="statusdot"></div>
<div id="ioniqpowertext"
     style="
        text-align:center;
        color:#ddd;
        font-size:18px;
        margin-top:8px;">
    ⚡ --
</div>
            
<span id="ioniqpower"
      style="display:none"
      data-type="label"
      data-device="Shelly2_Ioniq5"
      data-get="power">
</span>
            
<span id="ioniqrelay"
      style="display:none"
      data-type="label"
      data-device="Shelly2_Ioniq5"
      data-get="relay">
</span>
        </div>

    </div>

    <!-- Einhell Ladegeräte --------------------------------------------------->
   <div class="card">

    <div class="cardtitle">Einhell Ladegeräte</div>

    <div class="statusline">
        <div id="einhellstatus" class="statusdot"></div>
    </div>

    <div id="einhellpowertext"
         style="
            text-align:center;
            color:#ddd;
            font-size:18px;
            margin-top:8px;">
        ⚡ --
    </div>

    <div class="buttons">
        <div class="btn" onclick="einhellOn()">EIN</div>
        <div class="btn" onclick="einhellOff()">AUS</div>
    </div>

    <span id="einhellpower"
          style="display:none"
          data-type="label"
          data-device="Shelly3_Einhell"
          data-get="power">
    </span>

    <span id="einhellrelay"
          style="display:none"
          data-type="label"
          data-device="Shelly3_Einhell"
          data-get="relay">
    </span>

</div>

<script>
var smart=50;
var ioniq=50;
let smartDragging = false;
let ioniqDragging = false;

function updateBars() {

    // Smart
    let smart = parseFloat(
        $('[data-device="LadeManager"][data-get="Smart_SOC"]')
        .first().text()
    ) || 0;

    $("#smartbar").css("width", smart + "%");

// Slider nur aktualisieren, wenn er nicht benutzt wird
if (!$("#smartslider").is(":focus")) {
    $("#smartslider").val(smart);
}

// Prozentanzeige immer aus FHEM übernehmen
$("#smartslidervalue").text(smart + " %");

    // Hyundai
    let ioniq = parseFloat(
        $('[data-device="LadeManager"][data-get="Ioniq5_SOC"]')
        .first().text()
    ) || 0;
$("#ioniqbar").css("width", ioniq + "%");

if (!$("#ioniqslider").is(":focus")) {
    $("#ioniqslider").val(ioniq);
}

$("#ioniqslidervalue").text(ioniq + " %");
}   // <<< Ende von updateBars()
    
function updateStatus() {
    
const smartOn = $("#smartrelay").text() === "on";

$("#smartstatus").toggleClass("on", smartOn);

$("#smartstatustext").text(
    smartOn ? "Lädt" : "Aus"
);

const ioniqOn = $("#ioniqrelay").text() === "on";

$("#ioniqstatus").toggleClass("on", ioniqOn);

$("#ioniqstatustext").text(
    ioniqOn ? "Lädt" : "Aus"
);
 // Smart
let sp = parseFloat($("#smartpower").text()) || 0;

if ($("#smartrelay").text() === "on") {
    $("#smartpowertext").text(
        "⚡ " + (sp / 1000).toFixed(2).replace(".", ",") + " kW"
    );
} else {
    $("#smartpowertext").text("⚡ --");
}
    
// Ioniq
let ip = parseFloat($("#ioniqpower").text()) || 0;

if ($("#ioniqrelay").text() === "on") {
    $("#ioniqpowertext").text("⚡ " + formatPower(ip));
} else {
    $("#ioniqpowertext").text("⚡ --");
}
// Einhell Ladegeräte

const einhellOn = $("#einhellrelay").text() === "on";

$("#einhellstatus").toggleClass("on", einhellOn);

let ep = parseFloat($("#einhellpower").text()) || 0;

if (einhellOn) {
    $("#einhellpowertext").text("⚡ " + formatPower(ep));
} else {
    $("#einhellpowertext").text("⚡ --");
}
} // Ende updateStatus()

function formatPower(watt) {

    if (watt < 1000)
        return Math.round(watt) + " W";

    return (watt / 1000).toFixed(2).replace(".", ",") + " kW";
} // Ende function formatPower

    //-----------------------------------------------------
// Smart
//-----------------------------------------------------

function smart85(){

    $.get("/fhem?XHR=1&cmd="+
        encodeURIComponent("{Smart85();;}"));

}

function smart100(){

    $.get("/fhem?XHR=1&cmd="+
        encodeURIComponent("{Smart100();;}"));

}

//-----------------------------------------------------
// Ioniq
//-----------------------------------------------------

function ioniq85(){

    $.get("/fhem?XHR=1&cmd="+
        encodeURIComponent("{Ioniq85();;}"));

}

function ioniq100(){

    $.get("/fhem?XHR=1&cmd="+
        encodeURIComponent("{Ioniq100();;}"));

}
//-----------------------------------------------------
// Slider
//-----------------------------------------------------
function setSmartSOC(v){

    $.get(
        "/fhem?XHR=1&cmd=" +
        encodeURIComponent('{SetSOC("Smart",' + v + ');;}'),
        function() {
            setTimeout(updateBars, 300);
        }
    );
}

function setIoniqSOC(v){

    $.get(
        "/fhem?XHR=1&cmd=" +
        encodeURIComponent('{SetSOC("Ioniq5",' + v + ');;}'),
        function() {
            setTimeout(updateBars, 300);
        }
    );
}
  function einhellOn(){

    $.get("/fhem?XHR=1&cmd=" +
        encodeURIComponent("set Shelly3_Einhell on"));

}

function einhellOff(){

    $.get("/fhem?XHR=1&cmd=" +
        encodeURIComponent("set Shelly3_Einhell off"));

}  
$(function () {

    updateBars();
    updateStatus();

    setInterval(updateStatus, 250);

});
</script>
</body>
</html>
